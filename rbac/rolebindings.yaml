# =============================================================================
# RBAC Bindings – gán 3 vai trò cho 3 user
# alice → developer (Role, namespace demo)
# bob   → sre       (ClusterRoleBinding, toàn cụm)
# carol → viewer    (ClusterRoleBinding, toàn cụm)
#
# LƯU Ý: subjects.kind: User  (không phải ServiceAccount)
# =============================================================================

---
# ---------------------------------------------------------------------------
# 1. ALICE – gán Role:developer vào namespace demo
# ---------------------------------------------------------------------------
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: alice-developer-binding
  namespace: demo
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role          # Role → bó trong 1 namespace
  name: developer
subjects:
  - kind: User
    name: alice
    apiGroup: rbac.authorization.k8s.io

---
# ---------------------------------------------------------------------------
# 2. BOB – gán ClusterRole:sre toàn cụm
# ---------------------------------------------------------------------------
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: bob-sre-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole   # ClusterRole → toàn cụm
  name: sre
subjects:
  - kind: User
    name: bob
    apiGroup: rbac.authorization.k8s.io

---
# ---------------------------------------------------------------------------
# 3. CAROL – gán ClusterRole:viewer toàn cụm
# ---------------------------------------------------------------------------
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: carol-viewer-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole   # ClusterRole → toàn cụm
  name: viewer
subjects:
  - kind: User
    name: carol
    apiGroup: rbac.authorization.k8s.io
