# ArgoCD App: Deploy RBAC (roles + bindings) qua GitOps
# Quản lý Role/ClusterRole và RoleBinding/ClusterRoleBinding
# KHÔNG kubectl apply tay – mọi thay đổi qua git commit
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rbac
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    repoURL: https://github.com/hailv1209/W10-temp.git
    path: rbac
    targetRevision: main
  destination:
    server: https://kubernetes.default.svc
    namespace: ""          # Cluster-scoped resource (ClusterRole/ClusterRoleBinding)
  syncPolicy:
    automated:
      prune: true           # Xóa resource khỏi cluster khi xóa khỏi git
      selfHeal: true        # Tự động sync lại nếu ai sửa tay ngoài git
    syncOptions:
    - ServerSideApply=true  # Dùng Server-Side Apply để tránh conflict
