apiVersion: v1
kind: ResourceQuota
metadata:
  name: payments-budget
  namespace: payments
  labels:
    owner: payments
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  hard:
    pods: "10"
    requests.cpu: "500m"
    requests.memory: 512Mi
    limits.cpu: "1"
    limits.memory: 768Mi
---
apiVersion: v1
kind: LimitRange
metadata:
  name: payments-defaults
  namespace: payments
  labels:
    owner: payments
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  limits:
    - type: Container
      defaultRequest:
        cpu: 50m
        memory: 64Mi
      default:
        cpu: 100m
        memory: 128Mi
      max:
        cpu: 500m
        memory: 1Gi
